name: ci

# Ongoing test gate on the supported Python range. Keeps main green so every
# release the publish workflow cuts is from a tested state.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure git identity (the suite creates real repos)
        run: |
          git config --global user.name ci
          git config --global user.email ci@example.com
      - name: Run the test suite
        run: PYTHONPATH=src python -m unittest discover -s tests
